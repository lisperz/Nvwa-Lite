services:
  landing:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../landing:/usr/share/nginx/html:ro
      - ./nginx/landing.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nvwa-lite:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
      - ./pilot_tokens.json:/app/pilot_tokens.json
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    command: ["uv", "run", "streamlit", "run", "src/monitoring/dashboard.py", "--server.port=8502", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8502:8502"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
