server {
    listen 80;
    listen [::]:80;
    server_name nvwa.bio www.nvwa.bio;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nvwa.bio www.nvwa.bio;

    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/nvwa.bio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nvwa.bio/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Allow large file uploads (2 GB for .h5ad datasets)
    client_max_body_size 2000m;

    # Landing page (static files)
    root /var/www/nvwa.bio;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Streamlit app — proxied to port 8501
    location /app {
        proxy_pass http://localhost:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket support (required by Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Long timeouts for large file uploads and agent responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        # Disable buffering so Streamlit streaming works correctly
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Admin monitoring dashboard — proxied to port 8502
    location /admin {
        proxy_pass http://localhost:8502;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
